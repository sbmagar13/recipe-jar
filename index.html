<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Send the non-canonical hosts to the canonical domain so everyone's
      // jar lives on one origin (browser storage is per-domain). Runs before the
      // app loads; preview hash-URLs are untouched, so testing still works.
      if (
        location.hostname === 'recipe-jar.pages.dev' ||
        location.hostname === 'recipejar.sagarbudhathoki.com' ||
        location.hostname === 'www.recipejar.app'
      ) {
        location.replace('https://recipejar.app' + location.pathname + location.search + location.hash)
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#33663d" />
    <meta
      name="description"
      content="Paste a recipe link, get a clean card: ingredients and steps, nothing else. Save unlimited recipes on your own device. No account, no ads, free forever."
    />
    <title>Recipe Jar — just the recipe, yours to keep</title>

    <!-- Social unfurl (WhatsApp, Messenger, Facebook, Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Recipe Jar — just the recipe, yours to keep" />
    <meta
      property="og:description"
      content="Paste a recipe link, get a clean card. Save unlimited recipes on your own device. No account, no ads, free forever."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Recipe Jar — just the recipe, yours to keep" />
    <meta
      name="twitter:description"
      content="Paste a recipe link, get a clean card. Save unlimited recipes on your own device. Free forever."
    />
    <meta name="twitter:image" content="/og.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
