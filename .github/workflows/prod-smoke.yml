name: Production smoke

# Drive the live site end to end (fetch a real recipe, save, persist) every
# six hours, so a broken deploy or proxy pages the maintainer instead of a
# Reddit commenter. Runs scripts/live-smoke.ts against https://recipejar.app.
on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Smoke-test production
        run: npx tsx scripts/live-smoke.ts https://recipejar.app/
